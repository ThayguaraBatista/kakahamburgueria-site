<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAKA BURGUER - Cardápio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand"><span class="brand-primary">KAKA</span> <span class="brand-white">BURGUER</span></div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="cardapio.html" class="active">Cardápio</a></li>
            </ul>
        </div>
    </nav>

    <section class="content-section">
        <div class="container">
            <h1 style="text-align: center; color: white;"><span style="color: #ff8c00;">Nosso</span> Cardápio</h1>
            
            <h2 style="color: #ff8c00; text-align: center; margin-top: 40px;">🍔 Hambúrgueres Artesanais</h2>
            <div class="menu-grid" id="burgersGrid"></div>

            <h2 style="color: #ff8c00; text-align: center; margin-top: 40px;">🥤 Bebidas Geladas</h2>
            <div class="menu-grid" id="drinksGrid"></div>
        </div>
    </section>

    <script src="menu-data.js"></script>
    <script>
        function renderMenu() {
            const burgersGrid = document.getElementById('burgersGrid');
            const drinksGrid = document.getElementById('drinksGrid');

            if (typeof menuItems !== 'undefined') {
                burgersGrid.innerHTML = menuItems.filter(i => i.category === 'Burguers')
                    .map(item => createHTML(item)).join('');
                
                drinksGrid.innerHTML = menuItems.filter(i => i.category === 'Bebidas')
                    .map(item => createHTML(item)).join('');
            }
        }

        function createHTML(item) {
            return `
                <div class="menu-item">
                    <img src="${item.image}" alt="${item.name}" onerror="this.src='https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400'">
                    <div class="menu-item-content">
                        <h3>${item.name}</h3>
                        <p>${item.description}</p>
                        <div class="menu-item-price">R$ ${item.price.toFixed(2)}</div>
                    </div>
                </div>`;
        }
        document.addEventListener('DOMContentLoaded', renderMenu);
    </script>
</body>
</html>
