<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAKA BURGUER - Cardápio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand"><span class="brand-primary">KAKA</span> <span class="brand-white">BURGUER</span></div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="cardapio.html" class="active">Cardápio</a></li>
            </ul>
        </div>
    </nav>

    <section class="content-section">
        <div class="container">
            <h1 style="text-align: center; color: white;"><span style="color: #ff8c00;">Nosso</span> Cardápio</h1>
            
            <h2 style="color: #ff8c00; text-align: center; margin-top: 40px;">🍔 Hambúrgueres Artesanais</h2>
            <div class="menu-grid" id="burgersGrid"></div>

            <h2 style="color: #ff8c00; text-align: center; margin-top: 40px;">🥤 Bebidas Geladas</h2>
            <div class="menu-grid" id="drinksGrid"></div>
        </div>
    </section>

  <script>
        /**
         * Busca os dados do Back-end (Node.js + SQL) e renderiza na tela
         */
        async function renderMenu() {
            const burgersGrid = document.getElementById('burgersGrid');
            const drinksGrid = document.getElementById('drinksGrid');
            const addonsGrid = document.getElementById('addonsGrid');

            try {
                // Faz a chamada para o servidor Node na porta 3000
                const resposta = await fetch('http://localhost:3000/api/cardapio');
                
                if (!resposta.ok) throw new Error('Falha ao buscar dados do servidor');
                
                const menuItems = await resposta.json();

                // Renderiza Hambúrgueres
                if(burgersGrid) {
                    burgersGrid.innerHTML = menuItems
                        .filter(i => i.categoria === 'Burguers')
                        .map(item => createHTML(item)).join('');
                }

                // Renderiza Bebidas
                if(drinksGrid) {
                    drinksGrid.innerHTML = menuItems
                        .filter(i => i.categoria === 'Bebidas')
                        .map(item => createHTML(item)).join('');
                }

                // Renderiza Adicionais (Caso existam no banco)
                if(addonsGrid) {
                    addonsGrid.innerHTML = menuItems
                        .filter(i => i.categoria === 'Adicionais')
                        .map(item => createHTML(item)).join('');
                }

            } catch (erro) {
                console.error("Erro ao conectar com o Back-end:", erro);
                if(burgersGrid) burgersGrid.innerHTML = `<p style="color: white;">Erro ao carregar cardápio. Verifique se o servidor está rodando.</p>`;
            }
        }

        /**
         * Estrutura o HTML de cada item
         * Note: Usei item.imagem (como está no SQL) e item.preco
         */
        function createHTML(item) {
            // Garante que o caminho da imagem esteja correto
            const caminhoImagem = item.imagem || 'https://via.placeholder.com/300x200?text=Sem+Imagem';
            
            return `
                <div class="menu-item">
                    <img src="${caminhoImagem}" 
                         alt="${item.nome}" 
                         onerror="this.src='https://via.placeholder.com/300x200?text=Erro+na+Imagem'">
                    <div class="menu-item-content">
                        <h3>${item.nome}</h3>
                        <p>${item.descricao || ''}</p>
                        <div class="menu-item-price">R$ ${Number(item.preco).toFixed(2)}</div>
                    </div>
                </div>`;
        }

        // Inicia a renderização quando a página termina de carregar
        document.addEventListener('DOMContentLoaded', renderMenu);
    </script>
</body>
</html>
