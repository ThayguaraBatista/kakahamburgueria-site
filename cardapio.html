<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAKA BURGUER - Cardápio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand"><span class="brand-primary">KAKA</span> <span class="brand-white">BURGUER</span></div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="cardapio.html" class="active">Cardápio</a></li>
                <li><a href="pedidos.html">Pedidos</a></li>
            </ul>
        </div>
    </nav>

    <section class="content-section">
        <div class="container">
            <h1 style="text-align: center; color: white;"><span style="color: #ff8c00;">Nosso</span> Cardápio</h1>
            
            <h2 style="color: #ff8c00; text-align: center; margin-top: 40px;">🍔 Hambúrgueres Artesanais</h2>
            <div class="menu-grid" id="burgersGrid"></div>

            <h2 style="color: #ff8c00; text-align: center; margin-top: 40px;">🥤 Bebidas Geladas</h2>
            <div class="menu-grid" id="drinksGrid"></div>

            <h2 style="color: #ff8c00; text-align: center; margin-top: 40px;">🍟 Adicionais e Porções</h2>
            <div class="menu-grid" id="addonsGrid"></div>
        </div>
    </section>

    <script>
        async function renderMenu() {
            const burgersGrid = document.getElementById('burgersGrid');
            const drinksGrid = document.getElementById('drinksGrid');
            const addonsGrid = document.getElementById('addonsGrid');

            // --- INSIRA SEUS DADOS AQUI ---
            const SUPABASE_URL = 'COLE_AQUI_SUA_PROJECT_URL';
            const SUPABASE_KEY = 'COLE_AQUI_SUA_API_KEY_ANON';

            try {
                const resposta = await fetch(`${SUPABASE_URL}/rest/v1/produtos?select=*`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (!resposta.ok) throw new Error('Erro ao conectar com o banco');

                const menuItems = await resposta.json();

                if (burgersGrid) {
                    burgersGrid.innerHTML = menuItems
                        .filter(item => item.category === 'Burguers')
                        .map(item => createHTML(item)).join('');
                }
                
                if (drinksGrid) {
                    drinksGrid.innerHTML = menuItems
                        .filter(item => item.category === 'Bebidas')
                        .map(item => createHTML(item)).join('');
                }

                if (addonsGrid) {
                    addonsGrid.innerHTML = menuItems
                        .filter(item => item.category === 'Adicionais')
                        .map(item => createHTML(item)).join('');
                }

            } catch (erro) {
                console.error("Erro ao carregar dados:", erro);
                if(burgersGrid) burgersGrid.innerHTML = `<p style="color: white;">Erro ao carregar o cardápio. Tente novamente mais tarde.</p>`;
            }
        }

        function createHTML(item) {
            const fallbackImage = 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400';
            
            return `
                <div class="menu-item">
                    <img src="${item.image}" 
                         alt="${item.name}" 
                         onerror="this.onerror=null;this.src='${fallbackImage}';">
                    <div class="menu-item-content">
                        <h3>${item.name}</h3>
                        <p>${item.description || ''}</p>
                        <div class="menu-item-price">R$ ${Number(item.price).toFixed(2).replace('.', ',')}</div>
                    </div>
                </div>`;
        }

        document.addEventListener('DOMContentLoaded', renderMenu);
    </script>
</body>
</html>
