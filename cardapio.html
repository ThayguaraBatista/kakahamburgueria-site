<script>
        const menuItems = [
            {
                name: "Brasa Vini",
                description: "Pão brioche, queijo, blend (120g), bacon, cebola caramelizada e geleia de pimenta.",
                price: 25.00,
                image: "assets/imagens/brasa-vini.jpg",
                category: "Burguers"
            },
            {
                name: "Super Brasa",
                description: "2 queijos, 2 blends (120g cada) e bacon fatiado.",
                price: 24.00,
                image: "assets/imagens/superbrasa.jpg",
                category: "Burguers"
            },
            {
                name: "Brasa Gorgonzola",
                description: "Pão brioche, blend (120g), bacon, cebola caramelizada e gorgonzola.",
                price: 21.00,
                image: "assets/imagens/brasagorgonzola.jpg",
                category: "Burguers"
            },
            {
                name: "Coca-Cola 1L",
                description: "Refrigerante gelado 1 litro.",
                price: 9.00,
                image: "assets/imagens/coca1litro.png",
                category: "Bebidas"
            }
        ];

        function renderMenu() {
            const burgersGrid = document.getElementById('burgersGrid');
            const drinksGrid = document.getElementById('drinksGrid');

            if (burgersGrid) {
                burgersGrid.innerHTML = menuItems
                    .filter(item => item.category === 'Burguers')
                    .map(item => `
                        <div class="menu-item">
                            <img src="${item.image}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/300x200?text=Erro+na+Imagem'">
                            <div class="menu-item-content">
                                <h3>${item.name}</h3>
                                <p>${item.description}</p>
                                <div class="menu-item-price">R$ ${item.price.toFixed(2)}</div>
                            </div>
                        </div>
                    `).join('');
            }

            if (drinksGrid) {
                drinksGrid.innerHTML = menuItems
                    .filter(item => item.category === 'Bebidas')
                    .map(item => `
                        <div class="menu-item">
                            <img src="${item.image}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/300x200?text=Erro+na+Imagem'">
                            <div class="menu-item-content">
                                <h3>${item.name}</h3>
                                <p>${item.description}</p>
                                <div class="menu-item-price">R$ ${item.price.toFixed(2)}</div>
                            </div>
                        </div>
                    `).join('');
            }
        }
        document.addEventListener('DOMContentLoaded', renderMenu);
    </script>
